<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIRCLE DETECT — OpenCV.js</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:     #080c10;
    --panel:  #0d1318;
    --border: #1a2a35;
    --accent: #00e5ff;
    --accent2:#ff6b35;
    --text:   #b0ccd8;
    --dim:    #3a5060;
    --success:#00ff9d;
    --grid:   rgba(0,229,255,0.04);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden;background-image:linear-gradient(var(--grid) 1px,transparent 1px),linear-gradient(90deg,var(--grid) 1px,transparent 1px);background-size:40px 40px}

  header{border-bottom:1px solid var(--border);padding:18px 40px;display:flex;align-items:center;gap:20px;background:rgba(8,12,16,.92);backdrop-filter:blur(8px);position:sticky;top:0;z-index:100}
  .logo-mark{width:36px;height:36px;border:2px solid var(--accent);border-radius:50%;position:relative;flex-shrink:0}
  .logo-mark::after{content:'';position:absolute;inset:5px;border:1px solid var(--accent);border-radius:50%;opacity:.5}
  .logo-mark::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:6px;height:6px;background:var(--accent);border-radius:50%}
  h1{font-family:'Share Tech Mono',monospace;font-size:15px;letter-spacing:.25em;color:var(--accent);text-transform:uppercase}
  .header-tag{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);letter-spacing:.15em;border:1px solid var(--border);padding:2px 8px;margin-left:auto}
  #cv-status{font-family:'Share Tech Mono',monospace;font-size:11px;padding:4px 12px;border:1px solid;letter-spacing:.1em;transition:all .4s}
  #cv-status.loading{color:var(--accent2);border-color:var(--accent2);animation:pulse 1.2s infinite}
  #cv-status.ready{color:var(--success);border-color:var(--success)}
  #cv-status.error{color:#f44;border-color:#f44}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

  main{display:grid;grid-template-columns:320px 1fr;gap:24px;max-width:1400px;margin:0 auto;padding:32px 40px}

  .panel{background:var(--panel);border:1px solid var(--border);padding:24px;position:relative}
  .panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),transparent)}
  .panel-title{font-family:'Share Tech Mono',monospace;font-size:10px;letter-spacing:.3em;color:var(--dim);text-transform:uppercase;margin-bottom:20px;display:flex;align-items:center;gap:8px}
  .panel-title::after{content:'';flex:1;height:1px;background:var(--border)}

  .controls{grid-column:1;grid-row:1/3;display:flex;flex-direction:column;gap:20px}

  .upload-zone{border:1px dashed var(--dim);padding:28px 16px;text-align:center;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
  .upload-zone:hover,.upload-zone.drag{border-color:var(--accent);background:rgba(0,229,255,.04)}
  .upload-zone svg{width:32px;height:32px;stroke:var(--dim);margin-bottom:10px;transition:stroke .25s;display:block;margin-left:auto;margin-right:auto}
  .upload-zone:hover svg,.upload-zone.drag svg{stroke:var(--accent)}
  .upload-zone p{font-size:13px;color:var(--dim)}
  .upload-zone small{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--dim);opacity:.6}
  #file-input{display:none}

  .param-group{display:flex;flex-direction:column;gap:16px}
  .label-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .label-name{font-size:12px;font-weight:500;color:var(--text);letter-spacing:.05em;text-transform:uppercase}
  .label-val{font-family:'Share Tech Mono',monospace;font-size:12px;color:var(--accent)}
  input[type=range]{-webkit-appearance:none;width:100%;height:2px;background:var(--border);outline:none;cursor:pointer}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;border-radius:50%;background:var(--accent);border:2px solid var(--bg);box-shadow:0 0 8px var(--accent);transition:transform .15s}
  input[type=range]:hover::-webkit-slider-thumb{transform:scale(1.3)}

  .btn{width:100%;padding:14px;background:transparent;border:1px solid var(--accent);color:var(--accent);font-family:'Share Tech Mono',monospace;font-size:13px;letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
  .btn::before{content:'';position:absolute;inset:0;background:var(--accent);transform:translateX(-100%);transition:transform .25s;z-index:0}
  .btn:hover::before{transform:translateX(0)}
  .btn span{position:relative;z-index:1;transition:color .25s}
  .btn:hover span{color:var(--bg)}
  .btn:disabled{opacity:.3;cursor:not-allowed}
  .btn:disabled::before{display:none}
  .btn-secondary{border-color:var(--dim);color:var(--dim)}
  .btn-secondary::before{background:var(--dim)}

  .canvas-area{grid-column:2;grid-row:1}
  .canvas-wrapper{position:relative;background:#000;border:1px solid var(--border);min-height:380px;display:flex;align-items:center;justify-content:center;overflow:hidden}
  .canvas-wrapper canvas{display:block;max-width:100%;max-height:60vh;object-fit:contain}
  .canvas-wrapper::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);pointer-events:none}
  #placeholder{display:flex;flex-direction:column;align-items:center;gap:12px;color:var(--dim)}
  #placeholder svg{width:48px;height:48px;stroke:var(--dim);opacity:.4}
  #placeholder p{font-size:13px;letter-spacing:.05em}

  .corner{position:absolute;width:12px;height:12px}
  .corner.tl{top:8px;left:8px;border-top:1px solid var(--accent);border-left:1px solid var(--accent)}
  .corner.tr{top:8px;right:8px;border-top:1px solid var(--accent);border-right:1px solid var(--accent)}
  .corner.bl{bottom:8px;left:8px;border-bottom:1px solid var(--accent);border-left:1px solid var(--accent)}
  .corner.br{bottom:8px;right:8px;border-bottom:1px solid var(--accent);border-right:1px solid var(--accent)}

  .stats-area{grid-column:2;grid-row:2}
  .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:16px}
  .stat-card{background:rgba(0,229,255,.03);border:1px solid var(--border);padding:16px;text-align:center}
  .stat-num{font-family:'Share Tech Mono',monospace;font-size:28px;color:var(--accent);line-height:1;margin-bottom:6px}
  .stat-label{font-size:10px;letter-spacing:.15em;color:var(--dim);text-transform:uppercase}

  .circle-list{display:flex;flex-direction:column;gap:4px;max-height:140px;overflow-y:auto;padding-right:4px}
  .circle-list::-webkit-scrollbar{width:2px}
  .circle-list::-webkit-scrollbar-track{background:var(--border)}
  .circle-list::-webkit-scrollbar-thumb{background:var(--accent)}
  .circle-item{display:grid;grid-template-columns:28px 1fr 1fr 1fr;align-items:center;gap:8px;font-family:'Share Tech Mono',monospace;font-size:11px;padding:6px 10px;border:1px solid transparent;cursor:pointer;transition:all .15s}
  .circle-item:hover{border-color:var(--border);background:rgba(0,229,255,.03)}
  .circle-item.active{border-color:var(--accent);background:rgba(0,229,255,.06)}
  .ci-idx{color:var(--dim);font-size:10px}
  .ci-val{color:var(--text)}
  .swatch{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
  .no-circles{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dim);text-align:center;padding:20px;letter-spacing:.1em}

  @media(max-width:900px){main{grid-template-columns:1fr;padding:16px}.controls{grid-column:1;grid-row:auto}.canvas-area,.stats-area{grid-column:1;grid-row:auto}}
</style>
</head>
<body>

<header>
  <div class="logo-mark"></div>
  <h1>Circle Detect</h1>
  <span class="header-tag">Hough Transform / OpenCV.js</span>
  <div id="cv-status" class="loading">LOADING CV…</div>
</header>

<main>
  <!-- Controls -->
  <aside class="controls">
    <div class="panel">
      <div class="panel-title">入力</div>
      <div class="upload-zone" id="drop-zone">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <p>画像をドロップまたはクリック</p>
        <small>PNG / JPG / BMP / WEBP</small>
      </div>
      <input type="file" id="file-input" accept="image/*">
    </div>

    <div class="panel">
      <div class="panel-title">パラメータ</div>
      <div class="param-group">
        <label>
          <div class="label-row"><span class="label-name">DP（逆解像度比）</span><span class="label-val" id="val-dp">1.5</span></div>
          <input type="range" id="dp" min="1" max="3" step="0.1" value="1.5">
        </label>
        <label>
          <div class="label-row"><span class="label-name">MinDist（円間距離）</span><span class="label-val" id="val-mindist">40</span></div>
          <input type="range" id="mindist" min="5" max="200" step="1" value="40">
        </label>
        <label>
          <div class="label-row"><span class="label-name">Canny Upper</span><span class="label-val" id="val-p1">100</span></div>
          <input type="range" id="p1" min="10" max="300" step="1" value="100">
        </label>
        <label>
          <div class="label-row"><span class="label-name">Accumulator Threshold</span><span class="label-val" id="val-p2">30</span></div>
          <input type="range" id="p2" min="5" max="150" step="1" value="30">
        </label>
        <label>
          <div class="label-row"><span class="label-name">Min Radius</span><span class="label-val" id="val-minr">0</span></div>
          <input type="range" id="minr" min="0" max="200" step="1" value="0">
        </label>
        <label>
          <div class="label-row"><span class="label-name">Max Radius</span><span class="label-val" id="val-maxr">0</span></div>
          <input type="range" id="maxr" min="0" max="500" step="1" value="0">
        </label>
      </div>
    </div>

    <button class="btn" id="run-btn" disabled><span>▶ 検知実行</span></button>
    <button class="btn btn-secondary" id="reset-btn"><span>↺ リセット</span></button>
  </aside>

  <!-- Canvas -->
  <section class="canvas-area panel">
    <div class="panel-title">出力ビュー</div>
    <div class="canvas-wrapper" id="canvas-wrapper">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
      <div id="placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>
        </svg>
        <p>画像を読み込んでください</p>
      </div>
      <canvas id="output-canvas" style="display:none"></canvas>
    </div>
  </section>

  <!-- Stats -->
  <section class="stats-area panel">
    <div class="panel-title">検知結果</div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-num" id="stat-count">—</div><div class="stat-label">検知数</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-minr">—</div><div class="stat-label">最小半径 px</div></div>
      <div class="stat-card"><div class="stat-num" id="stat-maxr">—</div><div class="stat-label">最大半径 px</div></div>
    </div>
    <div id="circle-list-wrap">
      <p class="no-circles">円が検知されると一覧が表示されます</p>
    </div>
  </section>
</main>

<script async src="https://docs.opencv.org/4.8.0/opencv.js" onload="onCvReady()" onerror="onCvError()"></script>
<script>
const PALETTE=['#00e5ff','#ff6b35','#00ff9d','#ff3d71','#f7c244','#a78bfa','#34d399','#fb7185','#38bdf8','#fbbf24'];
let cvReady=false, origImg=null, circles=[];

const $=id=>document.getElementById(id);
const cvStatus=$('cv-status'), fileInput=$('file-input'), dropZone=$('drop-zone');
const runBtn=$('run-btn'), resetBtn=$('reset-btn');
const canvas=$('output-canvas'), ctx=canvas.getContext('2d');
const placeholder=$('placeholder');
const statCount=$('stat-count'), statMinR=$('stat-minr'), statMaxR=$('stat-maxr'), listWrap=$('circle-list-wrap');

// Sliders
['dp','mindist','p1','p2','minr','maxr'].forEach(id=>{
  const el=$(id), lbl=$('val-'+id);
  el.addEventListener('input',()=>lbl.textContent=el.value);
});

function onCvReady(){ cvReady=true; cvStatus.textContent='CV READY'; cvStatus.className='ready'; if(origImg) runBtn.disabled=false; }
function onCvError(){ cvStatus.textContent='CV ERROR'; cvStatus.className='error'; }

dropZone.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',e=>loadImage(e.target.files[0]));
dropZone.addEventListener('dragover',e=>{e.preventDefault();dropZone.classList.add('drag')});
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('drag'));
dropZone.addEventListener('drop',e=>{e.preventDefault();dropZone.classList.remove('drag');if(e.dataTransfer.files[0])loadImage(e.dataTransfer.files[0])});

function loadImage(file){
  if(!file||!file.type.startsWith('image/'))return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const img=new Image();
    img.onload=()=>{
      origImg=img; canvas.width=img.width; canvas.height=img.height;
      ctx.drawImage(img,0,0);
      placeholder.style.display='none'; canvas.style.display='block';
      if(cvReady) runBtn.disabled=false;
      clearStats(); circles=[];
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

runBtn.addEventListener('click',()=>{
  if(!cvReady||!origImg)return;
  runBtn.disabled=true; runBtn.querySelector('span').textContent='処理中…';
  setTimeout(()=>{
    try{ runDetect(); }catch(e){ console.error(e); }
    finally{ runBtn.disabled=false; runBtn.querySelector('span').textContent='▶ 検知実行'; }
  },10);
});

function runDetect(){
  const dp=parseFloat($('dp').value), minDist=parseFloat($('mindist').value);
  const p1=parseFloat($('p1').value), p2=parseFloat($('p2').value);
  const minR=parseInt($('minr').value), maxR=parseInt($('maxr').value);

  ctx.drawImage(origImg,0,0);
  const src=cv.imread(canvas), gray=new cv.Mat(), circ=new cv.Mat();
  cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY);
  cv.GaussianBlur(gray,gray,new cv.Size(9,9),2);
  cv.HoughCircles(gray,circ,cv.HOUGH_GRADIENT,dp,minDist,p1,p2,minR,maxR);

  circles=[];
  for(let i=0;i<circ.cols;i++){
    circles.push({x:circ.data32F[i*3],y:circ.data32F[i*3+1],r:circ.data32F[i*3+2]});
  }

  circles.forEach((c,i)=>{
    const col=PALETTE[i%PALETTE.length];
    // ring
    ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.strokeStyle=col; ctx.lineWidth=2; ctx.stroke();
    // crosshair
    ctx.globalAlpha=.5; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(c.x-12,c.y); ctx.lineTo(c.x+12,c.y);
    ctx.moveTo(c.x,c.y-12); ctx.lineTo(c.x,c.y+12); ctx.stroke();
    ctx.globalAlpha=1;
    // center
    ctx.beginPath(); ctx.arc(c.x,c.y,4,0,Math.PI*2); ctx.fillStyle=col; ctx.fill();
    // label
    ctx.font='bold 11px "Share Tech Mono",monospace'; ctx.fillStyle=col;
    ctx.fillText(`#${i+1} r=${Math.round(c.r)}`,c.x+c.r+5,c.y+4);
  });

  src.delete(); gray.delete(); circ.delete();
  renderStats();
}

function renderStats(){
  const n=circles.length; statCount.textContent=n;
  if(!n){ statMinR.textContent='—'; statMaxR.textContent='—'; listWrap.innerHTML='<p class="no-circles">円は検知されませんでした</p>'; return; }
  const radii=circles.map(c=>c.r);
  statMinR.textContent=Math.round(Math.min(...radii));
  statMaxR.textContent=Math.round(Math.max(...radii));
  listWrap.innerHTML=`<div class="circle-list">${circles.map((c,i)=>`
    <div class="circle-item" data-idx="${i}">
      <span class="ci-idx">#${i+1}</span>
      <span class="ci-val"><span class="swatch" style="background:${PALETTE[i%PALETTE.length]}"></span>r=${Math.round(c.r)}</span>
      <span class="ci-val">x=${Math.round(c.x)}</span>
      <span class="ci-val">y=${Math.round(c.y)}</span>
    </div>`).join('')}</div>`;
  listWrap.querySelectorAll('.circle-item').forEach(el=>{
    el.addEventListener('click',()=>{
      listWrap.querySelectorAll('.circle-item').forEach(e=>e.classList.remove('active'));
      el.classList.add('active'); highlightCircle(parseInt(el.dataset.idx));
    });
  });
}

function highlightCircle(idx){
  ctx.drawImage(origImg,0,0);
  circles.forEach((c,i)=>{
    if(i===idx)return;
    ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
    ctx.strokeStyle=PALETTE[i%PALETTE.length]; ctx.lineWidth=1.5; ctx.globalAlpha=.2; ctx.stroke(); ctx.globalAlpha=1;
  });
  const c=circles[idx], col=PALETTE[idx%PALETTE.length];
  ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
  ctx.strokeStyle=col; ctx.lineWidth=3; ctx.shadowColor=col; ctx.shadowBlur=14; ctx.stroke(); ctx.shadowBlur=0;
  ctx.beginPath(); ctx.arc(c.x,c.y,5,0,Math.PI*2); ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=10; ctx.fill(); ctx.shadowBlur=0;
  ctx.font='bold 12px "Share Tech Mono",monospace'; ctx.fillStyle=col;
  ctx.fillText(`#${idx+1}  r=${Math.round(c.r)}  (${Math.round(c.x)}, ${Math.round(c.y)})`,c.x+c.r+6,c.y+4);
}

function clearStats(){
  statCount.textContent='—'; statMinR.textContent='—'; statMaxR.textContent='—';
  listWrap.innerHTML='<p class="no-circles">円が検知されると一覧が表示されます</p>';
}

resetBtn.addEventListener('click',()=>{
  fileInput.value=''; origImg=null; circles=[];
  canvas.style.display='none'; placeholder.style.display='flex';
  runBtn.disabled=true; clearStats();
  const d={dp:'1.5',mindist:'40',p1:'100',p2:'30',minr:'0',maxr:'0'};
  Object.entries(d).forEach(([id,v])=>{ $(id).value=v; $('val-'+id).textContent=v; });
});
</script>
</body>
</html>
