<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>丸棒カウンター</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#111;overflow:hidden;font-family:'Arial Black',Arial,sans-serif;}

  /* ── 起動画面 ── */
  #home{
    position:fixed;inset:0;z-index:30;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:#111;gap:0;
  }
  #home h1{font-size:22px;color:#fff;letter-spacing:.15em;margin-bottom:4px;}
  #home p{font-size:12px;color:#666;letter-spacing:.08em;margin-bottom:48px;}

  .big-btn{
    width:220px;padding:18px 0;border:none;border-radius:6px;
    font-size:17px;font-weight:900;letter-spacing:.12em;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:10px;
    transition:filter .15s;
  }
  .big-btn:active{filter:brightness(0.8);}
  #btn-camera{background:#ff2222;color:#fff;margin-bottom:14px;}
  #btn-gallery{background:#222;color:#ccc;border:1px solid #333;}
  #btn-camera svg,#btn-gallery svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

  #input-camera{display:none;}
  #input-gallery{display:none;}

  /* ── 結果画面 ── */
  #result-screen{
    position:fixed;inset:0;z-index:20;
    display:none;flex-direction:column;
    background:#000;
  }

  /* カウントバー */
  #count-bar{
    flex-shrink:0;
    background:rgba(0,0,0,.85);
    text-align:center;
    padding:12px 0 8px;
    z-index:5;
  }
  #count-label{font-size:13px;color:rgba(255,255,255,.6);letter-spacing:.15em;}
  #count-num{
    font-size:96px;font-weight:900;line-height:1;color:#fff;
    text-shadow:0 0 28px rgba(255,50,50,.9),0 2px 8px rgba(0,0,0,1);
    letter-spacing:-3px;
  }

  /* 画像エリア */
  #img-wrap{
    flex:1;position:relative;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
  }
  #photo{
    max-width:100%;max-height:100%;
    object-fit:contain;display:block;
  }
  #overlay{
    position:absolute;top:0;left:0;
    pointer-events:none;
  }

  /* 処理中スピナー */
  #spinner{
    position:absolute;inset:0;
    display:flex;align-items:center;justify-content:center;
    background:rgba(0,0,0,.55);z-index:10;
  }
  #spinner svg{width:52px;height:52px;animation:spin 0.9s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #spinner.hidden{display:none;}

  /* 戻るボタン */
  #back-btn{
    position:absolute;bottom:24px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.7);border:1px solid #444;color:#fff;
    font-size:14px;font-weight:700;letter-spacing:.12em;
    padding:12px 36px;border-radius:30px;cursor:pointer;z-index:10;
    transition:background .15s;
  }
  #back-btn:active{background:rgba(255,34,34,.5);}

  /* CV ステータス小表示 */
  #cv-tag{
    position:fixed;bottom:8px;right:10px;z-index:40;
    font-size:10px;color:#555;letter-spacing:.05em;
  }
</style>
</head>
<body>

<!-- ── 起動画面 ── -->
<div id="home">
  <h1>丸棒カウンター</h1>
  <p>屋外・真上撮影用　丸棒断面 自動計数</p>

  <button class="big-btn" id="btn-camera">
    <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    撮影して計数
  </button>

  <button class="big-btn" id="btn-gallery">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    アルバムから選択
  </button>
</div>

<!-- カメラ / ギャラリー input -->
<input type="file" id="input-camera"  accept="image/*" capture="environment">
<input type="file" id="input-gallery" accept="image/*">

<!-- ── 結果画面 ── -->
<div id="result-screen">
  <div id="count-bar">
    <div id="count-label">検知数</div>
    <div id="count-num">—</div>
  </div>
  <div id="img-wrap">
    <img id="photo" alt="">
    <canvas id="overlay"></canvas>
    <div id="spinner">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ff2222" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 2a10 10 0 1 0 10 10" />
      </svg>
    </div>
  </div>
  <button id="back-btn">← 撮り直す</button>
</div>

<div id="cv-tag">OpenCV 読み込み中…</div>

<!-- 処理用（非表示） -->
<canvas id="proc" style="display:none"></canvas>

<script async src="https://docs.opencv.org/4.8.0/opencv.js"
  onload="onCvReady()" onerror="onCvError()"></script>
<script>
// ── 検知パラメータ（屋外・明るい環境・真上撮影・丸棒断面向け） ──
const CFG = {
  procW:     640,   // 処理解像度（横）
  procH:     480,   // 処理解像度（縦）
  dp:        1.8,
  minDist:   28,    // 円間最小距離 px（処理解像度基準）
  param1:    60,    // Canny 上限閾値
  param2:    22,    // 投票閾値（低め＝高感度）
  minRadius: 8,
  maxRadius: 100,
  blurK:     7,
};

let cvReady = false;
const cvTag = document.getElementById('cv-tag');

function onCvReady(){ cvReady=true; cvTag.textContent='CV OK'; }
function onCvError(){ cvTag.textContent='CV ERROR'; cvTag.style.color='#f44'; }

// ── UI 要素 ──
const home         = document.getElementById('home');
const resultScreen = document.getElementById('result-screen');
const photo        = document.getElementById('photo');
const overlay      = document.getElementById('overlay');
const spinner      = document.getElementById('spinner');
const countNum     = document.getElementById('count-num');
const backBtn      = document.getElementById('back-btn');
const proc         = document.getElementById('proc');
const pctx         = proc.getContext('2d', {willReadFrequently:true});
const octx         = overlay.getContext('2d');

// ── ボタン → input ──
document.getElementById('btn-camera') .addEventListener('click', ()=>document.getElementById('input-camera') .click());
document.getElementById('btn-gallery').addEventListener('click', ()=>document.getElementById('input-gallery').click());
document.getElementById('input-camera') .addEventListener('change', e=>loadFile(e.target.files[0]));
document.getElementById('input-gallery').addEventListener('change', e=>loadFile(e.target.files[0]));

backBtn.addEventListener('click', ()=>{
  resultScreen.style.display='none';
  home.style.display='flex';
  // reset inputs so same file can be picked again
  document.getElementById('input-camera').value='';
  document.getElementById('input-gallery').value='';
});

// ── 画像読み込み ──
function loadFile(file){
  if(!file||!file.type.startsWith('image/'))return;
  const url = URL.createObjectURL(file);
  photo.onload = ()=>{ URL.revokeObjectURL(url); startDetect(); };
  photo.src = url;
  home.style.display='none';
  resultScreen.style.display='flex';
  spinner.classList.remove('hidden');
  countNum.textContent='…';
}

// ── 写真が描画された後に検知 ──
function startDetect(){
  // photo が DOM にレイアウトされるまで少し待つ
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    syncOverlay();
    detect();
  }));
}

// overlay を photo の表示サイズに合わせる
function syncOverlay(){
  const r = photo.getBoundingClientRect();
  overlay.width  = r.width;
  overlay.height = r.height;
  overlay.style.left = (r.left - photo.parentElement.getBoundingClientRect().left) + 'px';
  overlay.style.top  = (r.top  - photo.parentElement.getBoundingClientRect().top)  + 'px';
}

// ── 検知本体 ──
function detect(){
  // CV 未準備ならリトライ
  if(!cvReady){ setTimeout(detect, 300); return; }

  // 縮小描画
  proc.width  = CFG.procW;
  proc.height = CFG.procH;
  pctx.drawImage(photo, 0, 0, CFG.procW, CFG.procH);

  let src, gray, circ;
  try{
    src  = cv.imread(proc);
    gray = new cv.Mat();
    circ = new cv.Mat();

    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
    cv.GaussianBlur(gray, gray, new cv.Size(CFG.blurK, CFG.blurK), 0);
    cv.HoughCircles(
      gray, circ, cv.HOUGH_GRADIENT,
      CFG.dp, CFG.minDist,
      CFG.param1, CFG.param2,
      CFG.minRadius, CFG.maxRadius
    );

    drawResults(circ);
    countNum.textContent = circ.cols;
  }catch(e){
    console.error(e);
    countNum.textContent = 'ERR';
  }finally{
    if(src)  src.delete();
    if(gray) gray.delete();
    if(circ) circ.delete();
    spinner.classList.add('hidden');
  }
}

// ── 検知円を描画 ──
function drawResults(circ){
  const ow = overlay.width, oh = overlay.height;
  const sx = ow / CFG.procW, sy = oh / CFG.procH;
  const scale = (sx + sy) / 2;

  octx.clearRect(0, 0, ow, oh);

  for(let i = 0; i < circ.cols; i++){
    const cx = circ.data32F[i*3]   * sx;
    const cy = circ.data32F[i*3+1] * sy;
    const r  = circ.data32F[i*3+2] * scale;

    // グロー
    octx.beginPath(); octx.arc(cx, cy, r+5, 0, Math.PI*2);
    octx.strokeStyle='rgba(255,50,50,0.28)'; octx.lineWidth=9; octx.stroke();

    // 赤い枠
    octx.beginPath(); octx.arc(cx, cy, r, 0, Math.PI*2);
    octx.strokeStyle='#ff2222'; octx.lineWidth=4; octx.stroke();

    // 中心点
    octx.beginPath(); octx.arc(cx, cy, 4, 0, Math.PI*2);
    octx.fillStyle='#ff2222'; octx.fill();

    // 番号
    const fs = Math.max(11, Math.min(r * 0.6, 28));
    octx.font=`bold ${fs}px Arial`;
    octx.textAlign='center'; octx.textBaseline='middle';
    octx.fillStyle='rgba(0,0,0,0.65)'; octx.fillText(i+1, cx+1, cy+1);
    octx.fillStyle='#fff';              octx.fillText(i+1, cx,   cy);
  }
}

// リサイズ時に overlay を再配置
window.addEventListener('resize', ()=>{
  if(resultScreen.style.display!=='none'){
    syncOverlay();
    // 再描画のみ（再検知なし）
    if(photo.complete) startDetect();
  }
});
</script>
</body>
</html>
