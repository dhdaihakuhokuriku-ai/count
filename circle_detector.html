<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>丸棒カウンター</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#111;overflow:hidden;
    font-family:'Arial Black',Arial,sans-serif;-webkit-tap-highlight-color:transparent;}

  /* ── 起動画面 ── */
  #home{
    position:fixed;inset:0;z-index:30;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:#111;gap:0;
  }
  #home h1{font-size:22px;color:#fff;letter-spacing:.12em;margin-bottom:4px;}
  #home p{font-size:12px;color:#555;letter-spacing:.06em;margin-bottom:52px;}

  .big-btn{
    width:240px;padding:18px 0;border:none;border-radius:6px;
    font-size:17px;font-weight:900;letter-spacing:.1em;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:10px;
    transition:filter .12s;-webkit-appearance:none;
  }
  .big-btn:active{filter:brightness(.75);}
  #btn-camera {background:#ff2222;color:#fff;margin-bottom:14px;}
  #btn-gallery{background:#1e1e1e;color:#bbb;border:1px solid #333;}
  .big-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;
    stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  #input-camera,#input-gallery{display:none;}

  /* ── 結果画面 ── */
  #result-screen{
    position:fixed;inset:0;z-index:20;
    display:none;flex-direction:column;background:#000;
  }

  /* カウントバー */
  #count-bar{
    flex-shrink:0;background:rgba(0,0,0,.88);
    text-align:center;padding:10px 0 6px;
  }
  #count-label{font-size:12px;color:rgba(255,255,255,.5);letter-spacing:.18em;}
  #count-num{
    font-size:88px;font-weight:900;line-height:1;color:#fff;
    text-shadow:0 0 30px rgba(255,40,40,.85),0 2px 10px rgba(0,0,0,1);
    letter-spacing:-3px;
  }

  /* 感度スライダーエリア */
  #slider-bar{
    flex-shrink:0;
    background:rgba(0,0,0,.75);
    display:flex;align-items:center;gap:12px;
    padding:8px 18px;border-top:1px solid #222;
  }
  #slider-bar label{
    font-size:11px;color:#888;letter-spacing:.08em;
    white-space:nowrap;flex-shrink:0;
  }
  #sens-slider{
    -webkit-appearance:none;flex:1;height:3px;
    background:linear-gradient(to right,#ff2222 var(--pct,50%),#333 var(--pct,50%));
    border-radius:2px;outline:none;cursor:pointer;
  }
  #sens-slider::-webkit-slider-thumb{
    -webkit-appearance:none;width:22px;height:22px;border-radius:50%;
    background:#ff2222;border:3px solid #111;box-shadow:0 0 6px rgba(255,34,34,.6);
  }
  #sens-val{
    font-size:12px;color:#ff2222;font-weight:700;
    min-width:24px;text-align:right;flex-shrink:0;
  }
  #rerun-btn{
    flex-shrink:0;background:#ff2222;color:#fff;border:none;
    font-size:12px;font-weight:700;letter-spacing:.08em;
    padding:7px 14px;border-radius:4px;cursor:pointer;
    white-space:nowrap;
  }
  #rerun-btn:active{filter:brightness(.75);}

  /* 画像エリア */
  #img-wrap{
    flex:1;position:relative;overflow:hidden;
    display:flex;align-items:center;justify-content:center;
  }
  #photo{max-width:100%;max-height:100%;object-fit:contain;display:block;}
  #overlay{position:absolute;top:0;left:0;pointer-events:none;}

  /* スピナー */
  #spinner{
    position:absolute;inset:0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(0,0,0,.6);z-index:10;gap:14px;
  }
  #spinner svg{width:52px;height:52px;animation:spin .85s linear infinite;}
  #spinner p{font-size:13px;color:#aaa;letter-spacing:.1em;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #spinner.hidden{display:none;}

  /* 戻るボタン */
  #back-btn{
    position:absolute;bottom:20px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.72);border:1px solid #444;color:#ccc;
    font-size:13px;font-weight:700;letter-spacing:.1em;
    padding:11px 32px;border-radius:28px;cursor:pointer;z-index:10;
  }
  #back-btn:active{background:rgba(255,34,34,.4);}

  #cv-tag{position:fixed;bottom:6px;right:8px;z-index:40;
    font-size:9px;color:#444;letter-spacing:.04em;}
</style>
</head>
<body>

<!-- 起動画面 -->
<div id="home">
  <h1>丸棒カウンター</h1>
  <p>φ5〜35mm 対応 ／ 最大500本</p>

  <button class="big-btn" id="btn-camera">
    <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    撮影して計数
  </button>
  <button class="big-btn" id="btn-gallery">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    アルバムから選択
  </button>
</div>

<input type="file" id="input-camera"  accept="image/*" capture="environment">
<input type="file" id="input-gallery" accept="image/*">

<!-- 結果画面 -->
<div id="result-screen">
  <div id="count-bar">
    <div id="count-label">検知数</div>
    <div id="count-num">—</div>
  </div>

  <!-- 感度スライダー -->
  <div id="slider-bar">
    <label>感度</label>
    <input type="range" id="sens-slider" min="1" max="9" step="1" value="5">
    <span id="sens-val">5</span>
    <button id="rerun-btn">再解析</button>
  </div>

  <div id="img-wrap">
    <img id="photo" alt="">
    <canvas id="overlay"></canvas>
    <div id="spinner">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ff2222" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 2a10 10 0 1 0 10 10"/>
      </svg>
      <p id="spinner-msg">解析中…</p>
    </div>
  </div>
  <button id="back-btn">← 撮り直す</button>
</div>

<div id="cv-tag">CV …</div>
<canvas id="proc" style="display:none"></canvas>

<script async src="https://docs.opencv.org/4.8.0/opencv.js"
  onload="onCvReady()" onerror="onCvError()"></script>
<script>
// ── 感度レベル → param2 のマッピング ──────────────────────
// 感度1（最小検知）= param2高 → 感度9（最大検知）= param2低
// param2 が低いほど多く検知する
const SENS_MAP = [null, 45, 38, 30, 24, 18, 14, 10, 7, 5];
//                       1   2   3   4   5   6   7  8  9

// ── 固定パラメータ（φ5〜35mm、真上撮影、屋外向け） ──────
const CFG = {
  procW:     800,   // 処理解像度（精度と速度のバランス）
  procH:     600,
  dp:        1.2,   // 解像度比（小さいほど精密）
  // minDist は写真幅に対する割合で動的計算（後述）
  minDistRatio: 0.022,  // 処理幅の約2.2%（密集した束に対応）
  param1:    50,    // Canny閾値（屋外の明瞭な輪郭向け）
  // param2 は感度スライダーで制御
  minRadius: 4,     // φ5mm相当（処理解像度基準）
  maxRadius: 130,   // φ35mm相当（処理解像度基準）
  blurK:     5,     // GaussianBlurカーネル
};

let cvReady = false;
let currentImageLoaded = false;

const $ = id => document.getElementById(id);
const cvTag       = $('cv-tag');
const home        = $('home');
const resultScreen= $('result-screen');
const photo       = $('photo');
const overlay     = $('overlay');
const spinner     = $('spinner');
const spinnerMsg  = $('spinner-msg');
const countNum    = $('count-num');
const sensSlider  = $('sens-slider');
const sensVal     = $('sens-val');
const proc        = $('proc');
const pctx        = proc.getContext('2d', {willReadFrequently:true});
const octx        = overlay.getContext('2d');

function onCvReady(){ cvReady=true; cvTag.textContent='CV OK';
  if(currentImageLoaded) detect(); }
function onCvError(){ cvTag.textContent='CV ERR'; cvTag.style.color='#f44'; }

// 感度スライダー
sensSlider.addEventListener('input', ()=>{
  sensVal.textContent = sensSlider.value;
  const pct = ((sensSlider.value - 1) / 8 * 100).toFixed(0);
  sensSlider.style.setProperty('--pct', pct + '%');
});

// ── ボタン ──
$('btn-camera') .addEventListener('click', ()=>$('input-camera') .click());
$('btn-gallery').addEventListener('click', ()=>$('input-gallery').click());
$('input-camera') .addEventListener('change', e=>loadFile(e.target.files[0]));
$('input-gallery').addEventListener('change', e=>loadFile(e.target.files[0]));
$('rerun-btn').addEventListener('click', ()=>{ if(currentImageLoaded) detect(); });
$('back-btn').addEventListener('click', ()=>{
  resultScreen.style.display='none';
  home.style.display='flex';
  currentImageLoaded = false;
  $('input-camera').value='';
  $('input-gallery').value='';
});

// ── 画像読み込み ──
function loadFile(file){
  if(!file||!file.type.startsWith('image/'))return;
  const url = URL.createObjectURL(file);
  photo.onload = ()=>{
    URL.revokeObjectURL(url);
    currentImageLoaded = true;
    home.style.display='none';
    resultScreen.style.display='flex';
    showSpinner('解析中…');
    countNum.textContent='…';
    // layout が確定するまで待つ
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      syncOverlay();
      if(cvReady) detect();
      // cvReady でなければ onCvReady() から detect() が呼ばれる
    }));
  };
  photo.src = url;
}

function syncOverlay(){
  const wrap = $('img-wrap').getBoundingClientRect();
  const r    = photo.getBoundingClientRect();
  overlay.width  = r.width;
  overlay.height = r.height;
  overlay.style.left = (r.left - wrap.left) + 'px';
  overlay.style.top  = (r.top  - wrap.top)  + 'px';
}

function showSpinner(msg){ spinner.classList.remove('hidden'); spinnerMsg.textContent=msg||''; }
function hideSpinner(){ spinner.classList.add('hidden'); }

// ── 検知本体 ──
function detect(){
  showSpinner('解析中…');
  setTimeout(()=>{ // UI更新を先に反映
    _runDetect();
  }, 30);
}

function _runDetect(){
  const param2  = SENS_MAP[parseInt(sensSlider.value)];
  const minDist = Math.max(6, Math.round(CFG.procW * CFG.minDistRatio));

  proc.width  = CFG.procW;
  proc.height = CFG.procH;
  pctx.drawImage(photo, 0, 0, CFG.procW, CFG.procH);

  let src, gray, circ;
  try{
    src  = cv.imread(proc);
    gray = new cv.Mat();
    circ = new cv.Mat();

    cv.cvtColor(src, gray, cv.COLOR_RGBA2GRAY);
    // コントラスト強調（CLAHE）で輪郭を鮮明に
    const clahe = new cv.CLAHE(2.5, new cv.Size(8, 8));
    clahe.apply(gray, gray);
    clahe.delete();

    cv.GaussianBlur(gray, gray, new cv.Size(CFG.blurK, CFG.blurK), 0);

    cv.HoughCircles(
      gray, circ, cv.HOUGH_GRADIENT,
      CFG.dp, minDist,
      CFG.param1, param2,
      CFG.minRadius, CFG.maxRadius
    );

    const n = circ.cols;
    drawResults(circ);
    countNum.textContent = n;
  }catch(e){
    console.error(e);
    countNum.textContent = 'ERR';
  }finally{
    if(src)  src.delete();
    if(gray) gray.delete();
    if(circ) circ.delete();
    hideSpinner();
  }
}

// ── 結果を overlay に描画 ──
function drawResults(circ){
  syncOverlay();
  const ow = overlay.width, oh = overlay.height;
  const sx = ow / CFG.procW, sy = oh / CFG.procH;
  const sc = (sx + sy) / 2;

  octx.clearRect(0, 0, ow, oh);

  for(let i=0; i<circ.cols; i++){
    const cx = circ.data32F[i*3]   * sx;
    const cy = circ.data32F[i*3+1] * sy;
    const r  = circ.data32F[i*3+2] * sc;

    // グロー
    octx.beginPath(); octx.arc(cx, cy, r+6, 0, Math.PI*2);
    octx.strokeStyle='rgba(255,40,40,0.22)'; octx.lineWidth=10; octx.stroke();

    // 赤い円枠（太め）
    octx.beginPath(); octx.arc(cx, cy, r, 0, Math.PI*2);
    octx.strokeStyle='#ff2222'; octx.lineWidth=3.5; octx.stroke();

    // 中心点
    octx.beginPath(); octx.arc(cx, cy, 3.5, 0, Math.PI*2);
    octx.fillStyle='#ff2222'; octx.fill();

    // 番号（円が小さい時は省略）
    if(r >= 10){
      const fs = Math.max(9, Math.min(r * 0.55, 22));
      octx.font=`bold ${fs}px Arial`;
      octx.textAlign='center'; octx.textBaseline='middle';
      octx.fillStyle='rgba(0,0,0,.6)'; octx.fillText(i+1, cx+1, cy+1);
      octx.fillStyle='#fff';           octx.fillText(i+1, cx,   cy);
    }
  }
}

window.addEventListener('resize', ()=>{
  if(currentImageLoaded && resultScreen.style.display!=='none'){
    syncOverlay();
    if(cvReady) drawResults; // 再描画のみ（再検知なし）
  }
});
</script>
</body>
</html>
