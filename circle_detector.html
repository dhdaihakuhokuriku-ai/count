<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>丸棒カウンター</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#111;overflow:hidden;
    font-family:'Arial Black',Arial,sans-serif;-webkit-tap-highlight-color:transparent;}
  #home{position:fixed;inset:0;z-index:30;background:#111;
    display:flex;flex-direction:column;align-items:center;justify-content:center;}
  #home h1{font-size:22px;color:#fff;letter-spacing:.12em;margin-bottom:6px;}
  #home p{font-size:12px;color:#555;margin-bottom:48px;}
  .big-btn{width:250px;padding:18px 0;border:none;border-radius:6px;
    font-size:17px;font-weight:900;letter-spacing:.08em;cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:10px;
    -webkit-appearance:none;transition:filter .12s;}
  .big-btn:active{filter:brightness(.75);}
  #btn-camera{background:#ff2222;color:#fff;margin-bottom:14px;}
  #btn-gallery{background:#1e1e1e;color:#bbb;border:1px solid #333;}
  .big-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
  #input-camera,#input-gallery{display:none;}
  #cv-badge{margin-top:36px;font-size:11px;padding:5px 14px;border-radius:20px;border:1px solid #333;color:#555;}
  #cv-badge.ok{color:#00cc66;border-color:#00cc66;}
  #cv-badge.err{color:#f44;border-color:#f44;}

  #result-screen{position:fixed;inset:0;z-index:20;display:none;flex-direction:column;background:#000;}
  #count-bar{flex-shrink:0;background:rgba(0,0,0,.92);text-align:center;padding:10px 0 6px;border-bottom:1px solid #1a1a1a;}
  #count-label{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.2em;}
  #count-num{font-size:92px;font-weight:900;line-height:1;color:#fff;
    text-shadow:0 0 30px rgba(255,40,40,.8),0 2px 10px rgba(0,0,0,1);letter-spacing:-3px;}

  #ctrl-bar{flex-shrink:0;background:rgba(0,0,0,.88);padding:10px 14px 8px;
    border-bottom:1px solid #1a1a1a;display:flex;flex-direction:column;gap:8px;}
  .ctrl-row{display:flex;align-items:center;gap:10px;}
  .ctrl-label{font-size:10px;color:#777;white-space:nowrap;width:60px;}
  input[type=range]{-webkit-appearance:none;flex:1;height:3px;background:#333;border-radius:2px;outline:none;cursor:pointer;}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#ff2222;border:2px solid #111;}
  .ctrl-val{font-size:11px;color:#ff2222;font-weight:700;width:32px;text-align:right;flex-shrink:0;}
  .ctrl-desc{font-size:9px;color:#444;flex:1;}
  .btn-row{display:flex;gap:8px;margin-top:2px;}
  .run-btn{flex:1;background:#ff2222;color:#fff;border:none;font-size:13px;font-weight:700;
    letter-spacing:.06em;padding:10px 0;border-radius:4px;cursor:pointer;}
  .run-btn:active{filter:brightness(.75);}
  #preview-toggle{background:#1a1a1a;color:#777;border:1px solid #333;
    font-size:11px;font-weight:700;padding:10px 14px;border-radius:4px;cursor:pointer;white-space:nowrap;}
  #preview-toggle.active{background:#001a00;color:#0f0;border-color:#0f0;}

  #hint{flex-shrink:0;padding:5px 14px;font-size:10px;color:#aa8800;
    background:#1a1400;border-bottom:1px solid #2a2000;display:none;line-height:1.5;}

  #img-wrap{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#000;}
  #photo{max-width:100%;max-height:100%;object-fit:contain;display:block;}
  #overlay{position:absolute;top:0;left:0;pointer-events:none;}

  #spinner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
    background:rgba(0,0,0,.65);z-index:10;gap:12px;}
  #spinner svg{width:48px;height:48px;animation:spin .85s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  #spinner.hidden{display:none;}
  #spinner-msg{font-size:13px;color:#aaa;letter-spacing:.08em;}

  #err-box{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);
    background:rgba(150,0,0,.9);color:#fff;font-size:12px;padding:8px 18px;
    border-radius:6px;white-space:nowrap;display:none;z-index:11;}

  #back-btn{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
    background:rgba(0,0,0,.72);border:1px solid #444;color:#ccc;
    font-size:13px;font-weight:700;padding:10px 28px;border-radius:26px;cursor:pointer;z-index:10;}
  #back-btn:active{background:rgba(255,34,34,.35);}
  #cv-tag{position:fixed;bottom:5px;right:8px;z-index:40;font-size:9px;color:#333;}
</style>
</head>
<body>

<div id="home">
  <h1>丸棒カウンター</h1>
  <p>φ5〜35mm対応 ／ 真円度フィルター方式</p>
  <button class="big-btn" id="btn-camera">
    <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
    撮影して計数
  </button>
  <button class="big-btn" id="btn-gallery">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    アルバムから選択
  </button>
  <div id="cv-badge">OpenCV 読み込み中…</div>
</div>
<input type="file" id="input-camera"  accept="image/*" capture="environment">
<input type="file" id="input-gallery" accept="image/*">

<div id="result-screen">
  <div id="count-bar">
    <div id="count-label">検知数</div>
    <div id="count-num">—</div>
  </div>
  <div id="ctrl-bar">
    <div class="ctrl-row">
      <span class="ctrl-label">真円度</span>
      <input type="range" id="sl-circ" min="1" max="9" value="6">
      <span class="ctrl-val" id="vl-circ">6</span>
      <span class="ctrl-desc">高=円形のみ厳選 / 低=楕円も検知</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">棒サイズ</span>
      <input type="range" id="sl-size" min="1" max="9" value="5">
      <span class="ctrl-val" id="vl-size">5</span>
      <span class="ctrl-desc">写真内の棒の見た目の大きさに合わせる</span>
    </div>
    <div class="btn-row">
      <button class="run-btn" id="rerun-btn">再解析</button>
      <button id="preview-toggle">エッジ確認</button>
    </div>
  </div>
  <div id="hint"></div>
  <div id="img-wrap">
    <img id="photo" alt="">
    <canvas id="overlay"></canvas>
    <div id="spinner">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ff2222" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 2a10 10 0 1 0 10 10"/>
      </svg>
      <p id="spinner-msg">解析中…</p>
    </div>
    <div id="err-box"></div>
  </div>
  <button id="back-btn">← 撮り直す</button>
</div>

<canvas id="proc" style="display:none"></canvas>
<div id="cv-tag">CV…</div>

<script async src="https://docs.opencv.org/4.8.0/opencv.js"
  onload="onCvReady()" onerror="onCvError()"></script>
<script>
// ══════════════════════════════════════════════════════
//  真円度 (circularity) = 4π × 面積 / 周長²
//    完全な円    → 1.0
//    正六角形    → 0.91
//    正方形      → 0.785
//    ノイズ/模様 → 0.1〜0.5 → ここで除外される
// ══════════════════════════════════════════════════════

// 真円度レベル(1-9) → 閾値
const CIRC_TBL = [null, 0.38, 0.46, 0.54, 0.61, 0.67, 0.73, 0.79, 0.85, 0.90];

// サイズレベル(1-9) → [minArea px², maxArea px²]  (処理解像度800×600基準)
const SIZE_TBL = [
  null,
  [ 40,   4000],  // 1: 極小
  [ 80,   8000],  // 2
  [130,  13000],  // 3
  [180,  18000],  // 4
  [250,  26000],  // 5 ★デフォルト
  [380,  36000],  // 6
  [550,  48000],  // 7
  [750,  62000],  // 8
  [1000, 80000],  // 9: 極大
];

const PROC_W=800, PROC_H=600;

let cvReady=false, imgLoaded=false, showEdge=false, lastDetected=[];

const $=id=>document.getElementById(id);
const proc=$ ('proc');
const pctx=proc.getContext('2d',{willReadFrequently:true});
const octx=$('overlay').getContext('2d');

function onCvReady(){
  cvReady=true;
  $('cv-badge').textContent='OpenCV 準備完了'; $('cv-badge').className='ok';
  $('cv-tag').textContent='CV OK';
  if(imgLoaded){ $('spinner-msg').textContent='解析中…'; runDetect(); }
}
function onCvError(){
  $('cv-badge').textContent='OpenCV 読み込み失敗'; $('cv-badge').className='err';
  showErr('OpenCV の読み込みに失敗しました'); $('spinner').classList.add('hidden');
}

['circ','size'].forEach(k=>{
  $('sl-'+k).addEventListener('input',()=>{ $('vl-'+k).textContent=$('sl-'+k).value; });
});

$('btn-camera') .addEventListener('click',()=>$('input-camera') .click());
$('btn-gallery').addEventListener('click',()=>$('input-gallery').click());
$('input-camera') .addEventListener('change',e=>loadFile(e.target.files[0]));
$('input-gallery').addEventListener('change',e=>loadFile(e.target.files[0]));

$('rerun-btn').addEventListener('click',()=>{
  if(!imgLoaded||!cvReady) return;
  showEdge=false; $('preview-toggle').classList.remove('active');
  hideErr(); hideHint(); showSpinner('解析中…'); $('count-num').textContent='…';
  setTimeout(runDetect,30);
});

$('preview-toggle').addEventListener('click',()=>{
  if(!imgLoaded) return;
  showEdge=!showEdge; $('preview-toggle').classList.toggle('active',showEdge);
  showEdge ? drawEdgePreview() : redrawCircles();
});

$('back-btn').addEventListener('click',()=>{
  $('result-screen').style.display='none'; $('home').style.display='flex';
  imgLoaded=false; showEdge=false; lastDetected=[];
  $('preview-toggle').classList.remove('active');
  hideErr(); hideHint();
  $('input-camera').value=''; $('input-gallery').value='';
});

function loadFile(file){
  if(!file||!file.type.startsWith('image/')) return;
  const url=URL.createObjectURL(file);
  $('photo').onload=()=>{
    URL.revokeObjectURL(url);
    imgLoaded=true;
    $('home').style.display='none'; $('result-screen').style.display='flex';
    hideErr(); hideHint(); $('count-num').textContent='…';
    showSpinner(cvReady?'解析中…':'OpenCV 読み込み中…');
    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      syncOverlay(); if(cvReady) runDetect();
    }));
  };
  $('photo').onerror=()=>showErr('画像の読み込みに失敗しました');
  $('photo').src=url;
}

function syncOverlay(){
  const wrap=$('img-wrap').getBoundingClientRect();
  const r=$('photo').getBoundingClientRect();
  const ov=$('overlay');
  ov.width=Math.round(r.width); ov.height=Math.round(r.height);
  ov.style.left=Math.round(r.left-wrap.left)+'px';
  ov.style.top =Math.round(r.top -wrap.top )+'px';
}

// ── 輪郭＋真円度フィルター検知 ──────────────────────────
function runDetect(){
  const circThresh=CIRC_TBL[parseInt($('sl-circ').value)];
  const [minArea,maxArea]=SIZE_TBL[parseInt($('sl-size').value)];

  proc.width=PROC_W; proc.height=PROC_H;
  pctx.drawImage($('photo'),0,0,PROC_W,PROC_H);

  let src,gray,bilat,edges,dilated,contours,hierarchy,kernel;
  try{
    src      =cv.imread(proc);
    gray     =new cv.Mat();
    bilat    =new cv.Mat();
    edges    =new cv.Mat();
    dilated  =new cv.Mat();
    contours =new cv.MatVector();
    hierarchy=new cv.Mat();

    cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY);

    // バイラテラルフィルター: エッジを保持しつつ面のノイズを除去
    cv.bilateralFilter(gray,bilat,9,75,75);

    // Cannyエッジ
    cv.Canny(bilat,edges,40,100);

    // 膨張: 輪郭の細い隙間を埋めて閉じた輪郭にする
    kernel=cv.Mat.ones(3,3,cv.CV_8U);
    cv.dilate(edges,dilated,kernel);

    // 輪郭を全て抽出
    cv.findContours(dilated,contours,hierarchy,cv.RETR_EXTERNAL,cv.CHAIN_APPROX_SIMPLE);

    const detected=[];
    for(let i=0;i<contours.size();i++){
      const cnt=contours.get(i);
      const area=cv.contourArea(cnt);

      // サイズフィルター
      if(area<minArea||area>maxArea){ cnt.delete(); continue; }

      const peri=cv.arcLength(cnt,true);
      if(peri<1){ cnt.delete(); continue; }

      // 真円度フィルター: 4π·A / P²  (円=1.0)
      const circ=(4*Math.PI*area)/(peri*peri);
      if(circ<circThresh){ cnt.delete(); continue; }

      // 重心
      const M=cv.moments(cnt);
      if(M.m00>0){
        detected.push({
          cx:M.m10/M.m00,
          cy:M.m01/M.m00,
          r :Math.sqrt(area/Math.PI)
        });
      }
      cnt.delete();
    }

    lastDetected=detected;
    $('count-num').textContent=detected.length;
    syncOverlay(); drawCircleData(detected);

    if(detected.length===0){
      showHint('⚠ 検知なし ― 「真円度」を下げる（4〜5）か「棒サイズ」を変えて再解析してください。「エッジ確認」で白い輪郭が棒の縁に出ているか確認できます。');
    } else if(detected.length>400){
      showHint('⚠ 多すぎる場合は「真円度」を上げて（7〜8）再解析してください。');
    } else {
      hideHint();
    }

  }catch(e){
    console.error(e);
    $('count-num').textContent='0';
    showErr('解析エラー: '+(e.message||String(e)));
    octx.clearRect(0,0,$('overlay').width,$('overlay').height);
  }finally{
    if(src)      src.delete();
    if(gray)     gray.delete();
    if(bilat)    bilat.delete();
    if(edges)    edges.delete();
    if(dilated)  dilated.delete();
    if(kernel)   kernel.delete();
    if(contours) contours.delete();
    if(hierarchy)hierarchy.delete();
    hideSpinner();
  }
}

function drawCircleData(detected){
  const ov=$('overlay');
  const ow=ov.width, oh=ov.height;
  const sx=ow/PROC_W, sy=oh/PROC_H, sc=(sx+sy)/2;
  octx.clearRect(0,0,ow,oh);
  detected.forEach((d,i)=>{
    const cx=d.cx*sx, cy=d.cy*sy, r=d.r*sc;
    octx.beginPath(); octx.arc(cx,cy,r+5,0,Math.PI*2);
    octx.strokeStyle='rgba(255,34,34,0.2)'; octx.lineWidth=10; octx.stroke();
    octx.beginPath(); octx.arc(cx,cy,r,0,Math.PI*2);
    octx.strokeStyle='#ff2222'; octx.lineWidth=3.5; octx.stroke();
    octx.beginPath(); octx.arc(cx,cy,3,0,Math.PI*2);
    octx.fillStyle='#ff2222'; octx.fill();
    if(r>=10){
      const fs=Math.max(9,Math.min(r*0.55,20));
      octx.font=`bold ${fs}px Arial`;
      octx.textAlign='center'; octx.textBaseline='middle';
      octx.fillStyle='rgba(0,0,0,.65)'; octx.fillText(i+1,cx+1,cy+1);
      octx.fillStyle='#fff';            octx.fillText(i+1,cx,cy);
    }
  });
}

function redrawCircles(){ drawCircleData(lastDetected); }

function drawEdgePreview(){
  if(!cvReady||!imgLoaded) return;
  proc.width=PROC_W; proc.height=PROC_H;
  pctx.drawImage($('photo'),0,0,PROC_W,PROC_H);
  let src,gray,bilat,edges;
  try{
    src=cv.imread(proc); gray=new cv.Mat(); bilat=new cv.Mat(); edges=new cv.Mat();
    cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY);
    cv.bilateralFilter(gray,bilat,9,75,75);
    cv.Canny(bilat,edges,40,100);
    syncOverlay();
    const ov=$('overlay'), ow=ov.width, oh=ov.height;
    octx.clearRect(0,0,ow,oh);
    cv.imshow(proc,edges);
    octx.drawImage(proc,0,0,PROC_W,PROC_H,0,0,ow,oh);
    octx.globalCompositeOperation='destination-over';
    octx.fillStyle='rgba(0,0,0,0.55)'; octx.fillRect(0,0,ow,oh);
    octx.globalCompositeOperation='source-over';
    showHint('エッジ確認：白い線が輪郭です。棒の断面の縁がリング状に白く出ていれば検知できます。');
  }catch(e){console.error(e);}
  finally{
    if(src)  src.delete(); if(gray) gray.delete();
    if(bilat)bilat.delete(); if(edges)edges.delete();
  }
}

function showSpinner(msg){ $('spinner').classList.remove('hidden'); $('spinner-msg').textContent=msg; }
function hideSpinner()   { $('spinner').classList.add('hidden'); }
function showErr(msg)    { const e=$('err-box'); e.textContent=msg; e.style.display='block'; }
function hideErr()       { $('err-box').style.display='none'; }
function showHint(msg)   { const h=$('hint'); h.textContent=msg; h.style.display='block'; }
function hideHint()      { $('hint').style.display='none'; }

window.addEventListener('resize',()=>{
  if(!imgLoaded||$('result-screen').style.display==='none') return;
  syncOverlay();
  showEdge ? drawEdgePreview() : redrawCircles();
});
</script>
</body>
</html>
