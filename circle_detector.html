<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>丸棒カウンター</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;background:#111;overflow:hidden;
  font-family:'Arial Black',Arial,sans-serif;-webkit-tap-highlight-color:transparent;}

/* ── 起動画面 ── */
#home{position:fixed;inset:0;z-index:30;background:#111;
  display:flex;flex-direction:column;align-items:center;justify-content:center;}
#home h1{font-size:22px;color:#fff;letter-spacing:.1em;margin-bottom:6px;}
#home p{font-size:12px;color:#555;margin-bottom:44px;}
.big-btn{width:250px;padding:18px 0;border:none;border-radius:6px;
  font-size:17px;font-weight:900;letter-spacing:.08em;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:10px;
  -webkit-appearance:none;transition:filter .12s;}
.big-btn:active{filter:brightness(.75);}
#btn-camera{background:#ff2222;color:#fff;margin-bottom:14px;}
#btn-gallery{background:#1e1e1e;color:#bbb;border:1px solid #333;}
.big-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
#input-camera,#input-gallery{display:none;}
#cv-badge{margin-top:32px;font-size:11px;padding:5px 14px;border-radius:20px;border:1px solid #333;color:#555;}
#cv-badge.ok{color:#00cc66;border-color:#00cc66;}
#cv-badge.err{color:#f44;border-color:#f44;}

/* ── ROI選択画面 ── */
#sel-screen{position:fixed;inset:0;z-index:25;display:none;flex-direction:column;background:#000;}
#sel-header{flex-shrink:0;background:#000;padding:12px 14px 10px;border-bottom:1px solid #222;}
#sel-header p{font-size:13px;color:#ffcc00;font-weight:700;margin-bottom:2px;}
#sel-header small{font-size:10px;color:#555;}
#sel-btns{flex-shrink:0;display:flex;gap:8px;padding:8px 14px;background:#000;border-bottom:1px solid #1a1a1a;}
#sel-reset{flex:1;background:#222;color:#aaa;border:1px solid #333;font-size:12px;font-weight:700;padding:10px 0;border-radius:4px;cursor:pointer;}
#sel-go{flex:2;background:#ff2222;color:#fff;border:none;font-size:14px;font-weight:700;padding:10px 0;border-radius:4px;cursor:pointer;}
#sel-go:disabled{opacity:.3;cursor:default;}
#sel-wrap{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#000;touch-action:none;}
#sel-img{max-width:100%;max-height:100%;object-fit:contain;display:block;user-select:none;pointer-events:none;}
#sel-cv{position:absolute;top:0;left:0;}
#sel-back{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.72);border:1px solid #444;color:#ccc;
  font-size:13px;font-weight:700;padding:10px 28px;border-radius:26px;cursor:pointer;z-index:5;}

/* ── 結果画面 ── */
#res-screen{position:fixed;inset:0;z-index:20;display:none;flex-direction:column;background:#000;}
#count-bar{flex-shrink:0;background:rgba(0,0,0,.94);text-align:center;padding:10px 0 6px;border-bottom:1px solid #1a1a1a;}
#count-lbl{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:.2em;}
#count-num{font-size:92px;font-weight:900;line-height:1;color:#fff;
  text-shadow:0 0 30px rgba(255,40,40,.8),0 2px 10px rgba(0,0,0,1);letter-spacing:-3px;}

#ctrl-bar{flex-shrink:0;background:rgba(0,0,0,.9);padding:9px 14px 7px;border-bottom:1px solid #1a1a1a;display:flex;flex-direction:column;gap:7px;}
.ctrl-row{display:flex;align-items:center;gap:8px;}
.ctrl-lbl{font-size:10px;color:#777;white-space:nowrap;width:54px;}
input[type=range]{-webkit-appearance:none;flex:1;height:3px;background:#333;border-radius:2px;outline:none;cursor:pointer;}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:#ff2222;border:2px solid #111;}
.ctrl-num{font-size:11px;color:#ff2222;font-weight:700;width:22px;text-align:right;flex-shrink:0;}
.ctrl-desc{font-size:9px;color:#444;flex:1;}
.btn-row{display:flex;gap:6px;margin-top:2px;}
.run-btn{flex:1;background:#ff2222;color:#fff;border:none;font-size:13px;font-weight:700;padding:10px 0;border-radius:4px;cursor:pointer;}
.run-btn:active{filter:brightness(.75);}
#resel-btn{background:#1a1400;color:#ffcc00;border:1px solid #443300;font-size:11px;font-weight:700;padding:10px 12px;border-radius:4px;cursor:pointer;white-space:nowrap;}
#edge-btn{background:#1a1a1a;color:#777;border:1px solid #333;font-size:11px;font-weight:700;padding:10px 12px;border-radius:4px;cursor:pointer;white-space:nowrap;}
#edge-btn.on{background:#001a00;color:#0f0;border-color:#0f0;}

#hint{flex-shrink:0;padding:5px 14px;font-size:10px;color:#aa8800;background:#1a1400;border-bottom:1px solid #2a2000;display:none;line-height:1.5;}

#img-wrap{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#000;}
#photo{max-width:100%;max-height:100%;object-fit:contain;display:block;}
#overlay{position:absolute;top:0;left:0;pointer-events:none;}

#spinner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.65);z-index:10;gap:12px;}
#spinner svg{width:48px;height:48px;animation:spin .85s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#spinner.hidden{display:none;}
#spin-msg{font-size:13px;color:#aaa;}

#back-btn{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.72);border:1px solid #444;color:#ccc;
  font-size:13px;font-weight:700;padding:10px 28px;border-radius:26px;cursor:pointer;z-index:10;}
#back-btn:active{background:rgba(255,34,34,.3);}
#err-box{position:absolute;bottom:70px;left:50%;transform:translateX(-50%);
  background:rgba(140,0,0,.9);color:#fff;font-size:12px;padding:8px 18px;border-radius:6px;white-space:nowrap;display:none;z-index:11;}
#cv-tag{position:fixed;bottom:5px;right:8px;z-index:40;font-size:9px;color:#333;}
</style>
</head>
<body>

<!-- 起動 -->
<div id="home">
  <h1>丸棒カウンター</h1>
  <p>端面の範囲を選んで計数</p>
  <button class="big-btn" id="btn-camera">
    <svg viewBox="0 0 24 24"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>撮影して計数
  </button>
  <button class="big-btn" id="btn-gallery">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>アルバムから選択
  </button>
  <div id="cv-badge">OpenCV 読み込み中…</div>
</div>
<input type="file" id="input-camera"  accept="image/*" capture="environment">
<input type="file" id="input-gallery" accept="image/*">

<!-- ROI選択 -->
<div id="sel-screen">
  <div id="sel-header">
    <p>① 端面が写っている部分だけをドラッグで囲む</p>
    <small>棒の側面・背景・棚は範囲から外すと精度が上がります</small>
  </div>
  <div id="sel-btns">
    <button id="sel-reset">やり直し</button>
    <button id="sel-go" disabled>② この範囲で解析 →</button>
  </div>
  <div id="sel-wrap">
    <img id="sel-img" alt="">
    <canvas id="sel-cv"></canvas>
  </div>
  <button id="sel-back">← 撮り直す</button>
</div>

<!-- 結果 -->
<div id="res-screen">
  <div id="count-bar">
    <div id="count-lbl">検知数</div>
    <div id="count-num">—</div>
  </div>
  <div id="ctrl-bar">
    <div class="ctrl-row">
      <span class="ctrl-lbl">感度</span>
      <input type="range" id="sl-sens" min="1" max="9" value="5">
      <span class="ctrl-num" id="vl-sens">5</span>
      <span class="ctrl-desc">低=厳格（誤検知減）/ 高=感度大（見落とし減）</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-lbl">棒径</span>
      <input type="range" id="sl-size" min="1" max="9" value="5">
      <span class="ctrl-num" id="vl-size">5</span>
      <span class="ctrl-desc">端面が小さい=低 / 大きい=高</span>
    </div>
    <div class="btn-row">
      <button class="run-btn" id="rerun-btn">再解析</button>
      <button id="resel-btn">範囲選び直し</button>
      <button id="edge-btn">エッジ確認</button>
    </div>
  </div>
  <div id="hint"></div>
  <div id="img-wrap">
    <img id="photo" alt="">
    <canvas id="overlay"></canvas>
    <div id="spinner">
      <svg viewBox="0 0 24 24" fill="none" stroke="#ff2222" stroke-width="2.5" stroke-linecap="round">
        <path d="M12 2a10 10 0 1 0 10 10"/>
      </svg>
      <p id="spin-msg">解析中…</p>
    </div>
    <div id="err-box"></div>
  </div>
  <button id="back-btn">← 撮り直す</button>
</div>

<canvas id="proc" style="display:none"></canvas>
<div id="cv-tag">CV…</div>

<script async src="https://docs.opencv.org/4.8.0/opencv.js"
  onload="onCvReady()" onerror="onCvError()"></script>
<script>
// ══════════════════════════════════════════════════════
//  アルゴリズム: HoughCircles を ROI内だけに適用
//  - 重なっている円も独立して検知できる
//  - ROI限定なので背景ノイズはゼロ
//  処理解像度: ROIを最大 PROC_MAX px 幅にリサイズして解析
// ══════════════════════════════════════════════════════

const PROC_MAX = 900; // 処理解像度の上限（広すぎると重い）

// 感度レベル → param2 (低いほど多く検知)
const SENS = [null, 38, 31, 25, 20, 16, 13, 10, 8, 6];
//                   1   2   3   4   5   6   7  8  9

// 棒径レベル → [minR, maxR] px (PROC_MAX基準)
const RSIZE = [
  null,
  [ 3,  14],  // 1
  [ 4,  18],  // 2
  [ 6,  24],  // 3
  [ 8,  30],  // 4
  [10,  40],  // 5 ★デフォルト
  [14,  52],  // 6
  [18,  65],  // 7
  [24,  80],  // 8
  [30, 100],  // 9
];

// ── 状態 ─────────────────────────────────────────────
let cvReady=false, imgLoaded=false, edgeMode=false;
let roiRect=null;       // {x,y,w,h} 元画像ピクセル座標
let lastCircles=[];     // [{cx,cy,r}] proc座標

// ROI選択
let selStart=null, selEnd=null, dragging=false;

const $=id=>document.getElementById(id);
const proc=$('proc'), pctx=proc.getContext('2d',{willReadFrequently:true});
const octx=$('overlay').getContext('2d');
const sctx=$('sel-cv').getContext('2d');

// ── OpenCV ────────────────────────────────────────────
function onCvReady(){
  cvReady=true; $('cv-badge').textContent='OpenCV 準備完了'; $('cv-badge').className='ok';
  $('cv-tag').textContent='CV OK';
  if(imgLoaded&&roiRect) runDetect();
}
function onCvError(){
  $('cv-badge').textContent='OpenCV 読み込み失敗'; $('cv-badge').className='err';
}

// ── スライダー ────────────────────────────────────────
['sens','size'].forEach(k=>{
  $('sl-'+k).addEventListener('input',()=>$('vl-'+k).textContent=$('sl-'+k).value);
});

// ── ボタン ────────────────────────────────────────────
$('btn-camera') .addEventListener('click',()=>$('input-camera') .click());
$('btn-gallery').addEventListener('click',()=>$('input-gallery').click());
$('input-camera') .addEventListener('change',e=>loadFile(e.target.files[0]));
$('input-gallery').addEventListener('change',e=>loadFile(e.target.files[0]));

$('rerun-btn').addEventListener('click',()=>{
  if(!imgLoaded||!cvReady||!roiRect) return;
  edgeMode=false; $('edge-btn').classList.remove('on');
  hideHint(); showSpinner('解析中…'); $('count-num').textContent='…';
  setTimeout(runDetect,30);
});
$('resel-btn').addEventListener('click',()=> goToSelect());
$('edge-btn').addEventListener('click',()=>{
  if(!imgLoaded||!roiRect) return;
  edgeMode=!edgeMode; $('edge-btn').classList.toggle('on',edgeMode);
  edgeMode ? drawEdge() : drawResult();
});
$('back-btn').addEventListener('click',resetAll);
$('sel-back').addEventListener('click',resetAll);
$('sel-reset').addEventListener('click',()=>{ selStart=selEnd=null; drawSel(); $('sel-go').disabled=true; });
$('sel-go').addEventListener('click',confirmROI);

// ── ファイル読み込み ──────────────────────────────────
function loadFile(file){
  if(!file||!file.type.startsWith('image/')) return;
  const url=URL.createObjectURL(file);
  let n=0; const done=()=>{ if(++n<2) return; URL.revokeObjectURL(url); imgLoaded=true; goToSelect(); };
  $('sel-img').onload=done; $('photo').onload=done;
  $('sel-img').src=url; $('photo').src=url;
}

// ── ROI選択画面 ───────────────────────────────────────
function goToSelect(){
  $('home').style.display='none'; $('res-screen').style.display='none';
  $('sel-screen').style.display='flex';
  selStart=selEnd=null; $('sel-go').disabled=true;
  requestAnimationFrame(()=>requestAnimationFrame(syncSelCv));
}

function syncSelCv(){
  const wrap=$('sel-wrap').getBoundingClientRect();
  const r=$('sel-img').getBoundingClientRect();
  const sc=$('sel-cv');
  sc.width=Math.round(r.width); sc.height=Math.round(r.height);
  sc.style.left=Math.round(r.left-wrap.left)+'px';
  sc.style.top =Math.round(r.top -wrap.top )+'px';
  drawSel();
}

function drawSel(){
  const sc=$('sel-cv');
  sctx.clearRect(0,0,sc.width,sc.height);
  if(!selStart||!selEnd) return;
  const x=Math.min(selStart.x,selEnd.x), y=Math.min(selStart.y,selEnd.y);
  const w=Math.abs(selEnd.x-selStart.x), h=Math.abs(selEnd.y-selStart.y);
  sctx.fillStyle='rgba(0,0,0,.5)';
  sctx.fillRect(0,0,sc.width,sc.height);
  sctx.clearRect(x,y,w,h);
  sctx.strokeStyle='#ffcc00'; sctx.lineWidth=2; sctx.strokeRect(x,y,w,h);
  const cs=10;
  sctx.strokeStyle='#fff'; sctx.lineWidth=3;
  [[x,y],[x+w,y],[x,y+h],[x+w,y+h]].forEach(([px,py])=>{
    const dx=px===x?1:-1, dy=py===y?1:-1;
    sctx.beginPath(); sctx.moveTo(px+dx*cs,py); sctx.lineTo(px,py); sctx.lineTo(px,py+dy*cs); sctx.stroke();
  });
}

function getPos(e){
  const r=$('sel-cv').getBoundingClientRect();
  const t=e.touches?e.touches[0]:e;
  return {x:t.clientX-r.left, y:t.clientY-r.top};
}

const sw=$('sel-wrap');
sw.addEventListener('mousedown',  e=>{dragging=true; selStart=selEnd=getPos(e); drawSel();});
sw.addEventListener('mousemove',  e=>{if(!dragging) return; selEnd=getPos(e); drawSel();});
sw.addEventListener('mouseup',    e=>{dragging=false; selEnd=getPos(e); drawSel(); checkSel();});
sw.addEventListener('touchstart', e=>{e.preventDefault(); dragging=true; selStart=selEnd=getPos(e); drawSel();},{passive:false});
sw.addEventListener('touchmove',  e=>{e.preventDefault(); if(!dragging) return; selEnd=getPos(e); drawSel();},{passive:false});
sw.addEventListener('touchend',   e=>{e.preventDefault(); dragging=false; checkSel();},{passive:false});

function checkSel(){
  if(!selStart||!selEnd) return;
  const w=Math.abs(selEnd.x-selStart.x), h=Math.abs(selEnd.y-selStart.y);
  $('sel-go').disabled=(w<20||h<20);
}

// ROI確定 → sel-canvas座標を元画像座標に変換
function confirmROI(){
  const img=$('sel-img');
  const pr=img.getBoundingClientRect();
  const sx=img.naturalWidth/pr.width, sy=img.naturalHeight/pr.height;
  const x=Math.min(selStart.x,selEnd.x), y=Math.min(selStart.y,selEnd.y);
  const w=Math.abs(selEnd.x-selStart.x), h=Math.abs(selEnd.y-selStart.y);
  roiRect={x:Math.round(x*sx), y:Math.round(y*sy), w:Math.round(w*sx), h:Math.round(h*sy)};

  $('sel-screen').style.display='none'; $('res-screen').style.display='flex';
  $('count-num').textContent='…'; edgeMode=false; $('edge-btn').classList.remove('on');
  hideHint(); showSpinner(cvReady?'解析中…':'OpenCV 読み込み中…');
  requestAnimationFrame(()=>requestAnimationFrame(()=>{syncOv(); if(cvReady) runDetect();}));
}

// ── overlay sync ──────────────────────────────────────
function syncOv(){
  const wrap=$('img-wrap').getBoundingClientRect();
  const r=$('photo').getBoundingClientRect();
  const ov=$('overlay');
  ov.width=Math.round(r.width); ov.height=Math.round(r.height);
  ov.style.left=Math.round(r.left-wrap.left)+'px';
  ov.style.top =Math.round(r.top -wrap.top )+'px';
}

// ── 検知 ─────────────────────────────────────────────
function runDetect(){
  if(!roiRect) return;
  const param2=SENS[parseInt($('sl-sens').value)];
  const [minR,maxR]=RSIZE[parseInt($('sl-size').value)];
  const roi=roiRect;

  // ROIを処理解像度にリサイズ
  const scale=Math.min(1.0, PROC_MAX/Math.max(roi.w,roi.h));
  const pw=Math.max(1,Math.round(roi.w*scale));
  const ph=Math.max(1,Math.round(roi.h*scale));
  const scaledMinR=Math.max(1,Math.round(minR*scale));
  const scaledMaxR=Math.round(maxR*scale);
  const minDist=Math.max(scaledMinR, Math.round(scaledMinR*1.6));

  proc.width=pw; proc.height=ph;
  pctx.drawImage($('photo'), roi.x,roi.y,roi.w,roi.h, 0,0,pw,ph);

  let src,gray,blur,circ;
  try{
    src =cv.imread(proc);
    gray=new cv.Mat(); blur=new cv.Mat(); circ=new cv.Mat();

    cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY);
    cv.GaussianBlur(gray,blur,new cv.Size(7,7),1.5);

    cv.HoughCircles(
      blur, circ,
      cv.HOUGH_GRADIENT,
      1.2,        // dp
      minDist,    // minDist between centers
      60,         // param1: Canny upper
      param2,     // param2: accumulator threshold
      scaledMinR,
      scaledMaxR
    );

    // Float32Array コピー保存
    lastCircles=[];
    for(let i=0;i<circ.cols;i++){
      lastCircles.push({
        cx:circ.data32F[i*3],
        cy:circ.data32F[i*3+1],
        r :circ.data32F[i*3+2],
      });
    }
    $('count-num').textContent=lastCircles.length;
    syncOv(); drawResult();

    if(lastCircles.length===0)
      showHint('⚠ 検知なし ― 感度を上げる（右に動かす）か、棒径を調整して「再解析」してください。「エッジ確認」で端面の縁が白く出ているか確認できます。');
    else if(lastCircles.length>400)
      showHint('⚠ 多すぎる場合は感度を下げて（左に動かす）再解析してください。');
    else hideHint();

  }catch(e){
    console.error(e); $('count-num').textContent='0'; showErr('解析エラー: '+(e.message||e));
    octx.clearRect(0,0,$('overlay').width,$('overlay').height);
  }finally{
    if(src) src.delete(); if(gray) gray.delete(); if(blur) blur.delete(); if(circ) circ.delete();
    hideSpinner();
  }
}

// ── 結果描画 ──────────────────────────────────────────
function drawResult(){
  const photo=$('photo');
  const ov=$('overlay');
  const pr=photo.getBoundingClientRect();
  // 元画像→表示座標
  const imgSX=pr.width/photo.naturalWidth, imgSY=pr.height/photo.naturalHeight;
  // ROI表示座標
  const roi=roiRect;
  const roiDispX=roi.x*imgSX, roiDispY=roi.y*imgSY;
  const roiDispW=roi.w*imgSX, roiDispH=roi.h*imgSY;

  const scale=Math.min(1.0, PROC_MAX/Math.max(roi.w,roi.h));
  const pw=Math.max(1,Math.round(roi.w*scale));
  const ph=Math.max(1,Math.round(roi.h*scale));

  // proc座標→表示座標
  const sx=roiDispW/pw, sy=roiDispH/ph;
  const sc=(sx+sy)/2;

  octx.clearRect(0,0,ov.width,ov.height);

  // ROI枠
  octx.strokeStyle='rgba(255,204,0,0.5)'; octx.lineWidth=1.5; octx.setLineDash([5,4]);
  octx.strokeRect(roiDispX,roiDispY,roiDispW,roiDispH);
  octx.setLineDash([]);

  lastCircles.forEach((d,i)=>{
    const cx=roiDispX+d.cx*sx;
    const cy=roiDispY+d.cy*sy;
    const r =d.r*sc;

    // グロー
    octx.beginPath(); octx.arc(cx,cy,r+5,0,Math.PI*2);
    octx.strokeStyle='rgba(255,34,34,0.2)'; octx.lineWidth=10; octx.stroke();
    // 赤枠
    octx.beginPath(); octx.arc(cx,cy,r,0,Math.PI*2);
    octx.strokeStyle='#ff2222'; octx.lineWidth=3.5; octx.stroke();
    // 中心
    octx.beginPath(); octx.arc(cx,cy,3,0,Math.PI*2);
    octx.fillStyle='#ff2222'; octx.fill();
    // 番号
    if(r>=9){
      const fs=Math.max(8,Math.min(r*0.55,18));
      octx.font=`bold ${fs}px Arial`; octx.textAlign='center'; octx.textBaseline='middle';
      octx.fillStyle='rgba(0,0,0,.7)'; octx.fillText(i+1,cx+1,cy+1);
      octx.fillStyle='#fff';           octx.fillText(i+1,cx,  cy);
    }
  });
}

// ── エッジ確認 ────────────────────────────────────────
function drawEdge(){
  if(!cvReady||!imgLoaded||!roiRect) return;
  const roi=roiRect;
  const scale=Math.min(1.0, PROC_MAX/Math.max(roi.w,roi.h));
  const pw=Math.max(1,Math.round(roi.w*scale));
  const ph=Math.max(1,Math.round(roi.h*scale));
  proc.width=pw; proc.height=ph;
  pctx.drawImage($('photo'), roi.x,roi.y,roi.w,roi.h, 0,0,pw,ph);

  let src,gray,blur,edges;
  try{
    src=cv.imread(proc); gray=new cv.Mat(); blur=new cv.Mat(); edges=new cv.Mat();
    cv.cvtColor(src,gray,cv.COLOR_RGBA2GRAY);
    cv.GaussianBlur(gray,blur,new cv.Size(7,7),1.5);
    cv.Canny(blur,edges,30,80);
    cv.imshow(proc,edges);

    const photo=$('photo'), ov=$('overlay');
    const pr=photo.getBoundingClientRect();
    const imgSX=pr.width/photo.naturalWidth, imgSY=pr.height/photo.naturalHeight;
    const ox=roi.x*imgSX, oy=roi.y*imgSY;
    const dw=roi.w*imgSX, dh=roi.h*imgSY;
    syncOv();
    octx.clearRect(0,0,ov.width,ov.height);
    // 全体を暗くしてROIにエッジ表示
    octx.fillStyle='rgba(0,0,0,.7)'; octx.fillRect(0,0,ov.width,ov.height);
    octx.drawImage(proc,0,0,pw,ph, ox,oy,dw,dh);
    octx.strokeStyle='#ffcc00'; octx.lineWidth=1.5; octx.setLineDash([5,4]);
    octx.strokeRect(ox,oy,dw,dh); octx.setLineDash([]);
    showHint('エッジ確認：棒の端面の縁がリング状に白く出ていればOKです。出ていない場合は感度を上げるか、撮影距離を変えてください。');
  }catch(e){console.error(e);}
  finally{
    if(src)  src.delete(); if(gray) gray.delete();
    if(blur) blur.delete(); if(edges)edges.delete();
  }
}

// ── リセット ──────────────────────────────────────────
function resetAll(){
  $('res-screen').style.display='none'; $('sel-screen').style.display='none';
  $('home').style.display='flex';
  imgLoaded=false; edgeMode=false; lastCircles=[]; roiRect=null; selStart=selEnd=null;
  $('edge-btn').classList.remove('on');
  hideErr(); hideHint();
  $('input-camera').value=''; $('input-gallery').value='';
}

// ── ヘルパー ──────────────────────────────────────────
function showSpinner(m){ $('spinner').classList.remove('hidden'); $('spin-msg').textContent=m; }
function hideSpinner() { $('spinner').classList.add('hidden'); }
function showErr(m)    { const e=$('err-box'); e.textContent=m; e.style.display='block'; }
function hideErr()     { $('err-box').style.display='none'; }
function showHint(m)   { const h=$('hint'); h.textContent=m; h.style.display='block'; }
function hideHint()    { $('hint').style.display='none'; }

window.addEventListener('resize',()=>{
  if($('sel-screen').style.display!=='none'){ syncSelCv(); return; }
  if(!imgLoaded||$('res-screen').style.display==='none') return;
  syncOv(); edgeMode ? drawEdge() : drawResult();
});
</script>
